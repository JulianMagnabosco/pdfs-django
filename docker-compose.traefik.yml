version: '3.8'

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      # debug settings
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      # production settings
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - web
    environment:
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE_ENTRYPOINT=web

  db:
    image: postgres:15-alpine
    container_name: pdfdb_postgres
    environment:
      POSTGRES_DB: pdfdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web
    expose:
      - "5432"

  web:
    build: .
    command: gunicorn pdfdb_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DEBUG: ${DEBUG:-1}
      PROD: ${PROD:-0}
      DATABASE_URL: ${DATABASE_URL:-postgres://turnerodb:turnerodb1234@db:5432/turnerodb}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,app.com}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-localhost,app.com}
    depends_on:
      - db
    networks:
      - web
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN:-app.com}`) || Host(`www.${DOMAIN:-app.com}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web.service=web"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
      # Redirect HTTP to HTTPS
      - "traefik.http.routers.web-http.rule=Host(`${DOMAIN:-app.com}`) || Host(`www.${DOMAIN:-app.com}`)"
      - "traefik.http.routers.web-http.entrypoints=web"
      - "traefik.http.routers.web-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

  # Optional: Add nginx for static files (more efficient than serving from Django)
  # Uncomment if you want to serve static files through nginx
  # nginx:
  #   image: nginx:alpine
  #   container_name: pdfdb_nginx
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - static_volume:/app/staticfiles:ro
  #     - media_volume:/app/media:ro
  #   networks:
  #     - web
  #   expose:
  #     - "80"
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.nginx.rule=Host(`${DOMAIN:-app.com}`) || Host(`www.${DOMAIN:-app.com}`)"
  #     - "traefik.http.routers.nginx.entrypoints=websecure"
  #     - "traefik.http.routers.nginx.tls=true"
  #     - "traefik.http.routers.nginx.tls.certresolver=letsencrypt"
  #     - "traefik.http.routers.nginx.service=nginx"
  #     - "traefik.http.services.nginx.loadbalancer.server.port=80"

volumes:
  postgres_data:
  traefik_letsencrypt:
  static_volume:
  media_volume:

networks:
  web:
    driver: bridge
