version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pdfdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: gunicorn pdfdb_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DEBUG: ${DEBUG:-1}
      PROD: ${PROD:-0}
      DATABASE_URL: ${DATABASE_URL:-postgres://turnerodb:turnerodb1234@db:5432/turnerodb}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,app.com}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-localhost,app.com}
    depends_on:
      - db

volumes:
  postgres_data:
