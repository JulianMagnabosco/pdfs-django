providers = ["python"]

[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = ["python -m pip install --upgrade pip",
        "python -m pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput"
]

[start]
cmd = "gunicorn pdfdb_project.wsgi:application --bind 0.0.0.0:8000"
